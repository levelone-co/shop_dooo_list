<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#2c7a4b" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Shop Wise" />
<link rel="manifest" href="manifest.json" />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%232c7a4b'/%3E%3Ctext x='50' y='68' font-size='60' text-anchor='middle' fill='white'%3E%F0%9F%9B%92%3C/text%3E%3C/svg%3E" />
<link rel="apple-touch-icon" href="icons/icon-192.svg" />
<title>Shop Wise</title>
<style>
  :root {
    --green: #2c7a4b;
    --green-dark: #1f5634;
    --green-light: #e8f5ee;
    --bg: #fafafa;
    --card: #ffffff;
    --text: #1a1a1a;
    --muted: #6b7280;
    --border: #e5e7eb;
    --danger: #dc2626;
    --warn: #f59e0b;
    --blue: #2563eb;
    --shopping-bg: #f0fdf4;
    --map-bg: #f4f4f5;
    --modal-overlay: rgba(0,0,0,0.5);
  }
  [data-theme="dark"] {
    --green: #4ade80;
    --green-dark: #16a34a;
    --green-light: #14532d;
    --bg: #0f1419;
    --card: #1a2027;
    --text: #e5e7eb;
    --muted: #9ca3af;
    --border: #2d3748;
    --danger: #ef4444;
    --warn: #fbbf24;
    --blue: #60a5fa;
    --shopping-bg: #0a2415;
    --map-bg: #0f1419;
    --modal-overlay: rgba(0,0,0,0.7);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: env(safe-area-inset-bottom);
    transition: background 0.2s, color 0.2s;
  }
  body.shopping { background: var(--shopping-bg); }
  header {
    background: var(--green);
    color: white;
    padding: calc(env(safe-area-inset-top) + 14px) 16px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 10;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  }
  header .titles { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
  header h1 { margin: 0; font-size: 20px; font-weight: 600; line-height: 1.1; }
  header .tagline { font-size: 11px; opacity: 0.85; font-weight: 400; line-height: 1.1; }
  header .right { display: flex; align-items: center; gap: 8px; }
  header .mode-pill {
    font-size: 12px;
    background: rgba(255,255,255,0.2);
    padding: 4px 10px;
    border-radius: 12px;
    cursor: pointer;
    user-select: none;
    transition: background 0.15s;
  }
  header .mode-pill:active { background: rgba(255,255,255,0.4); }
  header .theme-toggle {
    background: rgba(255,255,255,0.2);
    border: none;
    color: white;
    padding: 6px 10px;
    font-size: 16px;
    border-radius: 50%;
    cursor: pointer;
    width: 34px; height: 34px;
    display: flex; align-items: center; justify-content: center;
  }
  header .theme-toggle:active { background: rgba(255,255,255,0.35); }
  main { max-width: 600px; margin: 0 auto; padding: 16px; }

  /* Add row */
  .add-row {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px;
    margin-bottom: 12px;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 8px;
    position: relative;
  }
  .input-wrap { position: relative; }
  input, button {
    font: inherit;
    padding: 12px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--text);
  }
  input { width: 100%; padding-right: 40px; }
  input:focus { outline: 2px solid var(--green); border-color: var(--green); }
  .chevron-btn {
    position: absolute;
    right: 4px; top: 50%;
    transform: translateY(-50%);
    width: 32px; height: 32px;
    padding: 0;
    background: transparent;
    color: var(--muted);
    border: none;
    border-radius: 6px;
    font-size: 14px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .chevron-btn:hover { background: var(--green-light); color: var(--green-dark); }
  .chevron-btn:active { background: var(--green-light); }
  button {
    background: var(--green);
    color: white;
    border: none;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
  }
  button:active { background: var(--green-dark); }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  button.secondary { background: var(--card); color: var(--text); border: 1px solid var(--border); }
  button.danger { background: var(--danger); }
  button.warn { background: var(--warn); }

  /* Custom suggestions dropdown */
  .suggestions {
    position: absolute;
    top: calc(100% + 4px);
    left: 0; right: 0;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    max-height: 280px;
    overflow-y: auto;
    box-shadow: 0 8px 24px rgba(0,0,0,0.25);
    z-index: 5;
    display: none;
  }
  .suggestions.open { display: block; }
  .suggestion {
    padding: 10px 12px;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 12px;
    border-bottom: 1px solid var(--border);
  }
  .suggestion:last-child { border-bottom: none; }
  .suggestion.active, .suggestion:hover { background: var(--green-light); }
  .suggestion .prod {
    font-size: 16px;
    font-weight: 600;
    color: var(--text);
  }
  .suggestion .prod mark {
    background: transparent;
    color: var(--green-dark);
    font-weight: 700;
    text-decoration: underline;
  }
  .suggestion .ais {
    font-size: 12px;
    color: var(--muted);
    flex-shrink: 0;
  }

  .actions {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 8px;
  }
  .actions button { padding: 12px 6px; font-size: 14px; }
  .secondary-actions {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 16px;
  }
  .secondary-actions button { padding: 10px 6px; font-size: 13px; }
  @media print {
    header, .add-row, .actions, .secondary-actions, .shopping-banner, .stat-line, .modal-overlay,
    .find-btn, .del-btn, .check { display: none !important; }
    body { background: white !important; color: black !important; }
    main { max-width: none; padding: 12px; }
    .item { border: none; padding: 4px 0; background: transparent; }
    .aisle-header { color: black; border-bottom: 1px solid #999; }
  }

  /* Shopping banner takes the place of the add-row in shopping mode (same size). */
  .shopping-banner {
    background: linear-gradient(90deg, #fef3c7, #fde68a);
    border: 1px solid #f59e0b;
    color: #78350f;
    padding: 12px;
    border-radius: 12px;
    margin-bottom: 12px;
    font-weight: 600;
    font-size: 16px;
    text-align: center;
    cursor: pointer;
    user-select: none;
    /* match add-row's visual height: input padding 12px + border 2px + line-height ~24px ≈ 50px */
    min-height: 50px;
    display: flex; align-items: center; justify-content: center;
    transition: filter 0.15s;
  }
  .shopping-banner:active { filter: brightness(0.95); }
  [data-theme="dark"] .shopping-banner {
    background: linear-gradient(90deg, #422006, #78350f);
    border-color: #fbbf24;
    color: #fef3c7;
  }

  .aisle-group { margin-bottom: 18px; }
  .aisle-header {
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    color: var(--green);
    letter-spacing: 0.5px;
    padding: 6px 4px;
    margin-bottom: 4px;
    border-bottom: 2px solid var(--green-light);
  }
  .item {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 12px;
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .item.checked .name { text-decoration: line-through; color: var(--muted); }
  .item .name { flex: 1; font-size: 16px; }
  .item .check {
    width: 26px; height: 26px;
    border-radius: 50%;
    border: 2px solid var(--muted);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    user-select: none;
  }
  .item.checked .check { background: var(--green); border-color: var(--green); color: white; }
  .item .find-btn {
    width: auto; padding: 6px 10px; font-size: 12px;
    background: var(--green-light); color: var(--green-dark); border: none;
  }
  .item .del-btn {
    width: auto; padding: 6px 10px; font-size: 14px;
    background: transparent; color: var(--muted); border: none;
  }
  .item .del-btn:active { color: var(--danger); }
  .empty {
    text-align: center;
    padding: 40px 20px;
    color: var(--muted);
  }
  .empty .emoji { font-size: 48px; display: block; margin-bottom: 12px; }
  .stat-line { font-size: 13px; color: var(--muted); padding: 0 4px 8px; }
  footer.app-footer {
    text-align: center;
    color: var(--muted);
    font-size: 11px;
    padding: 24px 16px calc(env(safe-area-inset-bottom) + 24px);
    opacity: 0.7;
  }
  @media print { footer.app-footer { display: none !important; } }

  /* Modal / Finder */
  .modal-overlay {
    position: fixed; inset: 0; background: var(--modal-overlay);
    display: none; align-items: center; justify-content: center;
    z-index: 20; padding: 16px;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--card); color: var(--text); border-radius: 16px;
    max-width: 460px; width: 100%; max-height: 92vh; overflow: auto; padding: 16px;
  }
  .modal h2 { margin: 0 0 4px; font-size: 18px; }
  .modal .item-loc { color: var(--green); font-weight: 600; margin-bottom: 12px; }
  .map-wrap { background: var(--map-bg); border-radius: 10px; padding: 6px; margin-bottom: 12px; }
  .map-svg { width: 100%; height: auto; display: block; }
  .legend {
    display: flex; gap: 14px; font-size: 12px; color: var(--muted);
    padding: 4px 4px 8px; flex-wrap: wrap;
  }
  .legend span { display: inline-flex; align-items: center; gap: 4px; }
  .legend .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
</style>
</head>
<body>
<header>
  <div class="titles">
    <h1>🛒 Shop Wise</h1>
    <div class="tagline">Smarter aisles. Faster trips.</div>
  </div>
  <div class="right">
    <span class="mode-pill" id="modePill">List Mode</span>
    <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">🌙</button>
  </div>
</header>

<main>
  <div class="add-row" id="addRow">
    <div class="input-wrap">
      <input id="itemInput" type="text" placeholder="Type or pick an item…" autocomplete="off" autocapitalize="off" spellcheck="false" />
      <button class="chevron-btn" id="chevronBtn" aria-label="Show all items" type="button">▼</button>
      <div class="suggestions" id="suggestions"></div>
    </div>
    <button id="addBtn">Add</button>
  </div>

  <div id="shoppingBanner" class="shopping-banner" style="display:none">
    🛍️ You are in Shopping Mode
  </div>

  <div class="actions">
    <button id="shopBtn">🛍️ Start Shopping</button>
    <button id="undoBtn" class="secondary" disabled>↶ Undo</button>
    <button id="removeTickedBtn" class="secondary" disabled>🗑️ Remove Ticked</button>
    <button id="clearBtn" class="secondary">Clear All</button>
  </div>
  <div class="secondary-actions">
    <button id="shareBtn" class="secondary">📤 Share</button>
    <button id="printBtn" class="secondary">🖨️ Print</button>
  </div>

  <div class="stat-line" id="statLine"></div>

  <div id="list"></div>
</main>

<footer class="app-footer">
  Shop Wise · MVP <span id="appVersion">v0.4</span> · skeleton only — not for production
</footer>

<div class="modal-overlay" id="finderModal">
  <div class="modal">
    <h2 id="finderTitle">Finder</h2>
    <div class="item-loc" id="finderLoc"></div>
    <div class="map-wrap">
      <svg id="finderMap" class="map-svg" viewBox="0 0 220 340" xmlns="http://www.w3.org/2000/svg"></svg>
    </div>
    <div class="legend">
      <span><span class="dot" style="background:#2563eb"></span>You are here</span>
      <span><span class="dot" style="background:#2c7a4b"></span>Item location</span>
      <span><span class="dot" style="background:#f59e0b"></span>Walking route</span>
    </div>
    <button class="secondary" id="finderClose">Close</button>
  </div>
</div>

<script>
/* ============ Store layout ============ */
const ZONES = [
  { id: "bakery",   name: "Bakery",   order: 7,  kind: "perim", side: "top", x: 10,  y: 10,  w: 60, h: 40 },
  { id: "deli",     name: "Deli",     order: 11, kind: "perim", side: "top", x: 80,  y: 10,  w: 60, h: 40 },
  { id: "butchery", name: "Butchery", order: 12, kind: "perim", side: "top", x: 150, y: 10,  w: 60, h: 40 },

  { id: "produce", name: "Produce",       order: 1, kind: "aisle", x: 10,  y: 64, w: 20, h: 192 },
  { id: "a1",      name: "Aisle 1",       order: 2, kind: "aisle", x: 32,  y: 64, w: 20, h: 192, sub: "Snacks" },
  { id: "a2",      name: "Aisle 2",       order: 3, kind: "aisle", x: 54,  y: 64, w: 20, h: 192, sub: "Cereals" },
  { id: "a3",      name: "Aisle 3",       order: 4, kind: "aisle", x: 76,  y: 64, w: 20, h: 192, sub: "Canned" },
  { id: "a4",      name: "Aisle 4",       order: 5, kind: "aisle", x: 98,  y: 64, w: 20, h: 192, sub: "Pasta & Rice" },
  { id: "a5",      name: "Aisle 5",       order: 6, kind: "aisle", x: 120, y: 64, w: 20, h: 192, sub: "Cleaning" },
  { id: "a6",      name: "Aisle 6",       order: 8, kind: "aisle", x: 142, y: 64, w: 20, h: 192, sub: "Toiletries" },
  { id: "a7",      name: "Aisle 7",       order: 9, kind: "aisle", x: 164, y: 64, w: 20, h: 192, sub: "Beverages" },
  { id: "a8",      name: "Aisle 8",       order: 10,kind: "aisle", x: 186, y: 64, w: 20, h: 192, sub: "Baby & Pet" },

  { id: "dairy",    name: "Dairy",    order: 13, kind: "perim", side: "bottom", x: 10,  y: 270, w: 80, h: 40 },
  { id: "frozen",   name: "Frozen",   order: 14, kind: "perim", side: "bottom", x: 100, y: 270, w: 50, h: 40 },
  { id: "checkout", name: "Checkout", order: 15, kind: "perim", side: "bottom", x: 160, y: 270, w: 50, h: 40 },
];

const ENTRANCE = { x: 80, y: 315, w: 60, h: 20 };
const TOP_CORRIDOR_Y = 58;
const BOTTOM_CORRIDOR_Y = 263;

const zoneById = id => ZONES.find(z => z.id === id);
const zoneCenter = z => ({ x: z.x + z.w / 2, y: z.y + z.h / 2 });

const CATALOG = [
  { name: "Bananas",              aisle: "produce" },
  { name: "Apples",               aisle: "produce" },
  { name: "Tomatoes",             aisle: "produce" },
  { name: "Onions",               aisle: "produce" },
  { name: "Bread",                aisle: "bakery" },
  { name: "NikNaks",              aisle: "a1" },
  { name: "Simba Chips",          aisle: "a1" },
  { name: "Beacon Chocolate",     aisle: "a1" },
  { name: "Jungle Oats",          aisle: "a2" },
  { name: "ProNutro",             aisle: "a2" },
  { name: "Koo Baked Beans",      aisle: "a3" },
  { name: "Lucky Star Pilchards", aisle: "a3" },
  { name: "Tastic Rice",          aisle: "a4" },
  { name: "Fatti's Pasta",        aisle: "a4" },
  { name: "Sunlight Dishwash",    aisle: "a5" },
  { name: "Handy Andy",           aisle: "a5" },
  { name: "Colgate Toothpaste",   aisle: "a6" },
  { name: "Dove Soap",            aisle: "a6" },
  { name: "Coca-Cola",            aisle: "a7" },
  { name: "Rooibos Tea",          aisle: "a7" },
  { name: "Five Roses Tea",       aisle: "a7" },
  { name: "Purity Baby Food",     aisle: "a8" },
  { name: "Pampers",              aisle: "a8" },
  { name: "Chappies",             aisle: "checkout" },
  { name: "Russians",             aisle: "deli" },
  { name: "Mince",                aisle: "butchery" },
  { name: "Chicken",              aisle: "butchery" },
  { name: "Milk",                 aisle: "dairy" },
  { name: "Yoghurt",              aisle: "dairy" },
  { name: "Whipped Cream",        aisle: "dairy" },
  { name: "Frozen Peas",          aisle: "frozen" },
];

/* ============ State + undo (last add or tick only) ============ */
const STORAGE_KEY = "shopwise.state.v1";
const THEME_KEY = "shopwise.theme";
let state = loadState();
// lastAction: { kind: "add"|"tick", id: itemId } — cleared by any other action.
let lastAction = null;

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const s = JSON.parse(raw);
      if (s && Array.isArray(s.items)) {
        s.items = s.items.filter(i => !i.checked);
        s.shopping = false; // always open in List Mode
        return s;
      }
    }
  } catch (e) {}
  return { items: [], shopping: false };
}
function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (e) {}
}
function undo() {
  if (!lastAction) return;
  if (lastAction.kind === "add") {
    state.items = state.items.filter(i => i.id !== lastAction.id);
  } else if (lastAction.kind === "tick") {
    const it = state.items.find(i => i.id === lastAction.id);
    if (it) it.checked = !it.checked;
  }
  lastAction = null;
  saveState();
  render();
}

/* ============ Theme ============ */
function applyTheme(theme) {
  document.documentElement.dataset.theme = theme;
  const btn = document.getElementById("themeToggle");
  if (btn) btn.textContent = theme === "dark" ? "☀️" : "🌙";
}
function toggleTheme() {
  const next = document.documentElement.dataset.theme === "dark" ? "light" : "dark";
  localStorage.setItem(THEME_KEY, next);
  applyTheme(next);
}
applyTheme(localStorage.getItem(THEME_KEY) || "light");

/* ============ Rendering ============ */
const $ = id => document.getElementById(id);

function render() {
  const list = $("list");
  list.innerHTML = "";

  $("modePill").textContent = state.shopping ? "Shopping Mode" : "List Mode";
  document.body.classList.toggle("shopping", state.shopping);
  $("shopBtn").textContent = state.shopping ? "← Back to List" : "🛍️ Start Shopping";
  $("shopBtn").className = state.shopping ? "secondary" : "";
  $("undoBtn").disabled = !lastAction || !state.items.some(i => i.id === lastAction.id);
  $("removeTickedBtn").disabled = !state.items.some(i => i.checked);
  $("addRow").style.display = state.shopping ? "none" : "";
  $("shoppingBanner").style.display = state.shopping ? "flex" : "none";

  const total = state.items.length;
  const done = state.items.filter(i => i.checked).length;
  $("statLine").textContent = total === 0
    ? ""
    : state.shopping
      ? `${done} of ${total} collected`
      : `${total} item${total === 1 ? "" : "s"} on list`;

  if (total === 0) {
    list.innerHTML = `<div class="empty"><span class="emoji">🛒</span>Your list is empty.<br>Type or pick an item above to get started.</div>`;
    return;
  }

  const groups = {};
  for (const it of state.items) (groups[it.aisle] ||= []).push(it);
  const orderedZones = ZONES.filter(z => groups[z.id]).sort((a,b) => a.order - b.order);
  const unknownItems = groups["unknown"] || [];

  function renderItemRow(it, hasMap) {
    const row = document.createElement("div");
    row.className = "item" + (it.checked ? " checked" : "");
    const findBtn = (state.shopping && hasMap)
      ? `<button class="find-btn" data-find="${it.id}">📍 Find</button>`
      : "";
    row.innerHTML = `
      <div class="check" data-id="${it.id}">${it.checked ? "✓" : ""}</div>
      <div class="name">${escapeHtml(it.name)}</div>
      ${findBtn}
      <button class="del-btn" data-del="${it.id}" aria-label="Delete">✕</button>
    `;
    return row;
  }

  for (const zone of orderedZones) {
    const group = document.createElement("div");
    group.className = "aisle-group";
    const subText = zone.sub ? ` — ${zone.sub}` : "";
    group.innerHTML = `<div class="aisle-header">${zone.name}${subText}</div>`;
    for (const it of groups[zone.id]) group.appendChild(renderItemRow(it, true));
    list.appendChild(group);
  }

  if (unknownItems.length) {
    const group = document.createElement("div");
    group.className = "aisle-group";
    group.innerHTML = `<div class="aisle-header" style="color:var(--muted);border-bottom-color:var(--border)">Other — uncategorised</div>`;
    for (const it of unknownItems) group.appendChild(renderItemRow(it, false));
    list.appendChild(group);
  }
}
function escapeHtml(s) {
  return s.replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}

/* ============ Autocomplete ============ */
const inputEl = $("itemInput");
const suggBox = $("suggestions");
let activeSugg = -1;
let lastTyped = "";  // user-typed prefix (without ghost completion)
let lastInputType = "";

function rankMatches(q) {
  const lq = q.trim().toLowerCase();
  if (!lq) return [];
  const starts = [], contains = [];
  for (const c of CATALOG) {
    const ln = c.name.toLowerCase();
    if (ln.startsWith(lq)) starts.push(c);
    else if (ln.includes(lq)) contains.push(c);
  }
  starts.sort((a,b) => a.name.localeCompare(b.name));
  contains.sort((a,b) => a.name.localeCompare(b.name));
  return [...starts, ...contains].slice(0, 6);
}

function renderSuggestions(matches, query) {
  suggBox.innerHTML = "";
  if (!matches.length) { suggBox.classList.remove("open"); return; }
  matches.forEach((m, i) => {
    const div = document.createElement("div");
    div.className = "suggestion" + (i === activeSugg ? " active" : "");
    div.dataset.name = m.name;
    const aisle = zoneById(m.aisle);
    const sub = aisle.sub ? ` (${aisle.sub})` : "";
    div.innerHTML = `<span class="prod">${highlightMatch(m.name, query)}</span><span class="ais">${aisle.name}${sub}</span>`;
    suggBox.appendChild(div);
  });
  suggBox.classList.add("open");
}

function highlightMatch(name, query) {
  if (!query) return escapeHtml(name);
  const lq = query.toLowerCase();
  const ln = name.toLowerCase();
  const idx = ln.indexOf(lq);
  if (idx < 0) return escapeHtml(name);
  return escapeHtml(name.slice(0, idx)) +
    "<mark>" + escapeHtml(name.slice(idx, idx + query.length)) + "</mark>" +
    escapeHtml(name.slice(idx + query.length));
}

function applyInlineGhost(typedRaw) {
  // Inline ghost text: input value = matched full name, with the suffix selected.
  // User keeps typing → selection is replaced. Enter → whole name is added.
  const typed = typedRaw;
  if (!typed) return;
  const matches = rankMatches(typed);
  const ghostable = matches.find(m => m.name.toLowerCase().startsWith(typed.toLowerCase()));
  if (ghostable && ghostable.name.length > typed.length) {
    inputEl.value = ghostable.name.slice(0, typed.length) + ghostable.name.slice(typed.length);
    // Preserve user's casing for the typed prefix:
    inputEl.value = typed + ghostable.name.slice(typed.length);
    inputEl.setSelectionRange(typed.length, ghostable.name.length);
  }
}

inputEl.addEventListener("input", (e) => {
  lastInputType = e.inputType || "";
  // The user's intended typed prefix: everything before any selection (since
  // we may have just inserted ghost text). On 'input', the input.value already
  // reflects the change after the user's edit.
  const value = inputEl.value;
  // If it's a deletion event, treat the current value as plain typed (no ghost).
  if (lastInputType.startsWith("delete")) {
    lastTyped = value;
    activeSugg = 0;
    renderSuggestions(rankMatches(value), value);
    return;
  }
  // For insertions, try to extract what the user actually typed.
  // The selectionStart points at end of typed prefix when ghost is selected.
  const typedPrefix = inputEl.value.slice(0, inputEl.selectionStart);
  lastTyped = typedPrefix || value;
  activeSugg = 0;
  renderSuggestions(rankMatches(lastTyped), lastTyped);
  // Apply ghost only on insert
  applyInlineGhost(lastTyped);
});

inputEl.addEventListener("keydown", (e) => {
  if (e.key === "Enter") {
    e.preventDefault();
    suggBox.classList.remove("open");
    if (addItem(inputEl.value)) {
      inputEl.value = "";
      lastTyped = "";
      activeSugg = -1;
    }
    return;
  }
  if (e.key === "ArrowDown") {
    e.preventDefault();
    const items = suggBox.querySelectorAll(".suggestion");
    if (!items.length) return;
    activeSugg = (activeSugg + 1) % items.length;
    items.forEach((el, i) => el.classList.toggle("active", i === activeSugg));
    inputEl.value = items[activeSugg].dataset.name;
    inputEl.setSelectionRange(lastTyped.length, inputEl.value.length);
    return;
  }
  if (e.key === "ArrowUp") {
    e.preventDefault();
    const items = suggBox.querySelectorAll(".suggestion");
    if (!items.length) return;
    activeSugg = (activeSugg - 1 + items.length) % items.length;
    items.forEach((el, i) => el.classList.toggle("active", i === activeSugg));
    inputEl.value = items[activeSugg].dataset.name;
    inputEl.setSelectionRange(lastTyped.length, inputEl.value.length);
    return;
  }
  if (e.key === "Escape") {
    suggBox.classList.remove("open");
  }
});

inputEl.addEventListener("focus", () => {
  if (inputEl.value) {
    activeSugg = 0;
    renderSuggestions(rankMatches(inputEl.value), inputEl.value);
  }
});
inputEl.addEventListener("blur", () => {
  // small delay to allow click on a suggestion
  setTimeout(() => suggBox.classList.remove("open"), 150);
});

suggBox.addEventListener("mousedown", (e) => {
  // mousedown rather than click so it fires before blur
  const s = e.target.closest(".suggestion");
  if (!s) return;
  e.preventDefault();
  if (addItem(s.dataset.name)) {
    inputEl.value = "";
    lastTyped = "";
    activeSugg = -1;
    suggBox.classList.remove("open");
    inputEl.focus();
  }
});

/* ============ Item actions ============ */
function findCatalogMatch(query) {
  if (!query) return null;
  const q = query.trim().toLowerCase();
  if (!q) return null;
  const exact = CATALOG.find(c => c.name.toLowerCase() === q);
  if (exact) return exact;
  return null;
}

/* Keyword-based aisle inference for free-text items. Order matters:
   first matching rule wins, so put more specific keywords first. */
const AISLE_RULES = [
  [["milk","cream","cheese","yog","butter","custard","maas","feta"], "dairy"],
  [["bread","roll","muffin","croissant","bun","loaf","bagel","baguette","pita","pita bread"], "bakery"],
  [["ham","salami","olive","russian","viennas","pate","polony"], "deli"],
  [["beef","lamb","pork","chicken","mince","sausage","steak","bacon","wors","rib","liver"], "butchery"],
  [["frozen","ice cream","ice-cream","fish finger"], "frozen"],
  [["apple","banana","orange","tomato","onion","lettuce","carrot","potato","cucumber","spinach","pepper","lemon","lime","grape","avocado","mango","pear","cabbage","broccoli","mushroom","strawberry","fruit","veg","ginger","garlic","chilli","leek","beetroot","pumpkin","butternut"], "produce"],
  [["chip","chocolate","sweet","candy","biscuit","cracker","slab","crisps","pretzel","nuts"], "a1"],
  [["cereal","oat","muesli","weetbix","cornflake","pronutro","granola","porridge"], "a2"],
  [["tin","tinned","canned","baked bean","pilchard","tuna","soup","tomato sauce","peach","corn"], "a3"],
  [["pasta","rice","noodle","spaghetti","macaroni","cous","quinoa","lasagne"], "a4"],
  [["soap","detergent","bleach","cleaner","polish","sponge","washing","dishwash","handy andy","domestos","pine","mr min"], "a5"],
  [["shampoo","toothpaste","deodorant","razor","tampon","conditioner","floss","brush","sanitary","cotton wool","plaster","panty"], "a6"],
  [["tea","coffee","juice","water","cola","wine","beer","cooldrink","cool drink","fanta","sprite","rooibos"], "a7"],
  [["diaper","nappy","baby","pet","dog","cat","puppy","kitten","catfood","dogfood","biltong"], "a8"],
  [["gum","mints","chappies"], "checkout"],
];
function guessAisle(name) {
  const n = name.toLowerCase();
  for (const [kws, aisle] of AISLE_RULES) {
    for (const k of kws) if (n.includes(k)) return aisle;
  }
  return "unknown";
}

function addItem(query) {
  if (!query) return false;
  const trimmed = query.trim();
  if (!trimmed) return false;
  const cat = findCatalogMatch(trimmed);
  let name, aisle;
  if (cat) {
    name = cat.name;
    aisle = cat.aisle;
  } else {
    // Free-text entry: keep user's wording, guess the aisle.
    name = trimmed.replace(/\s+/g, " ");
    aisle = guessAisle(name);
  }
  if (state.items.some(i => i.name.toLowerCase() === name.toLowerCase())) return false;
  const id = crypto.randomUUID ? crypto.randomUUID() : String(Date.now() + Math.random());
  state.items.push({ id, name, aisle, checked: false });
  lastAction = { kind: "add", id };
  saveState();
  render();
  return true;
}
function toggleItem(id) {
  const it = state.items.find(i => i.id === id);
  if (!it) return;
  it.checked = !it.checked;
  lastAction = { kind: "tick", id };
  saveState();
  render();
}
function deleteItem(id) {
  if (!state.items.some(i => i.id === id)) return;
  state.items = state.items.filter(i => i.id !== id);
  if (lastAction && lastAction.id === id) lastAction = null;
  saveState();
  render();
}
function clearList() {
  if (state.items.length === 0) return;
  if (!confirm("Are you sure you want to clear the entire list? This cannot be undone.")) return;
  state.items = [];
  state.shopping = false;
  lastAction = null;
  saveState();
  render();
}
function removeTicked() {
  const tickedCount = state.items.filter(i => i.checked).length;
  if (tickedCount === 0) return;
  state.items = state.items.filter(i => !i.checked);
  lastAction = null;
  saveState();
  render();
}
function toggleShopping() {
  state.shopping = !state.shopping;
  lastAction = null;
  saveState();
  render();
}

/* ============ Share & Print ============ */
function buildShareText() {
  if (state.items.length === 0) return "Shop Wise — empty list";
  const groups = {};
  for (const it of state.items) (groups[it.aisle] ||= []).push(it);
  const ordered = ZONES.filter(z => groups[z.id]).sort((a, b) => a.order - b.order);
  let txt = "🛒 Shop Wise list\n";
  for (const z of ordered) {
    txt += `\n${z.name}${z.sub ? " — " + z.sub : ""}\n`;
    for (const it of groups[z.id]) txt += `  ${it.checked ? "☑" : "☐"} ${it.name}\n`;
  }
  return txt;
}
async function shareList() {
  const text = buildShareText();
  if (navigator.share) {
    try { await navigator.share({ title: "Shop Wise list", text }); return; } catch (e) {}
  }
  try {
    await navigator.clipboard.writeText(text);
    alert("List copied to clipboard.");
  } catch (e) {
    prompt("Copy your list:", text);
  }
}
function printList() { window.print(); }

/* ============ Finder map (SVG) with random pin + smart routing ============ */
function svgEl(name, attrs = {}) {
  const el = document.createElementNS("http://www.w3.org/2000/svg", name);
  for (const k in attrs) el.setAttribute(k, attrs[k]);
  return el;
}

function pickRandomPin() {
  // Weighted random spawn:
  //  40% mid-aisle (random aisle, random y inside the aisle strip)
  //  25% bottom corridor
  //  15% top corridor
  //  20% inside a perimeter zone (Bakery/Deli/Butchery/Dairy/Frozen)
  const r = Math.random();
  if (r < 0.40) {
    const aisles = ZONES.filter(z => z.kind === "aisle");
    const a = aisles[Math.floor(Math.random() * aisles.length)];
    return {
      x: a.x + a.w / 2,
      y: a.y + 6 + Math.random() * (a.h - 12),
      _zone: a.id,
    };
  }
  if (r < 0.65) {
    return { x: 20 + Math.random() * 180, y: BOTTOM_CORRIDOR_Y };
  }
  if (r < 0.80) {
    return { x: 20 + Math.random() * 180, y: TOP_CORRIDOR_Y };
  }
  const perims = ZONES.filter(z => z.kind === "perim");
  const p = perims[Math.floor(Math.random() * perims.length)];
  return {
    x: p.x + 6 + Math.random() * (p.w - 12),
    y: p.y + p.h / 2,
    _zone: p.id,
  };
}

function pinSide(pin) {
  // Which corridor is the pin closer to?
  return Math.abs(pin.y - TOP_CORRIDOR_Y) < Math.abs(pin.y - BOTTOM_CORRIDOR_Y) ? "top" : "bottom";
}
function targetSide(zone) {
  if (zone.kind === "aisle") return null; // either corridor works
  return zone.side; // top or bottom
}

function buildRoute(pin, target, targetZone) {
  const pts = [{ x: pin.x, y: pin.y }];
  const tSide = targetSide(targetZone);
  let useCorridor;

  if (tSide === "top") useCorridor = "top";
  else if (tSide === "bottom") useCorridor = "bottom";
  else useCorridor = pinSide(pin); // aisle target → use whichever corridor is closer to the pin

  const corridorY = useCorridor === "top" ? TOP_CORRIDOR_Y : BOTTOM_CORRIDOR_Y;

  // 1) Get pin out to that corridor (vertically, at pin.x)
  if (Math.abs(pin.y - corridorY) > 1) {
    pts.push({ x: pin.x, y: corridorY });
  }
  // 2) Travel along corridor to target's column
  pts.push({ x: target.x, y: corridorY });
  // 3) Into the target
  pts.push({ x: target.x, y: target.y });
  return pts;
}

function drawMap(highlightZoneId) {
  const svg = $("finderMap");
  svg.innerHTML = "";

  // Corridor strips
  svg.appendChild(svgEl("rect", { x: 8, y: TOP_CORRIDOR_Y - 4, width: 204, height: 8, fill: "#ffffff", opacity: 0.6 }));
  svg.appendChild(svgEl("rect", { x: 8, y: BOTTOM_CORRIDOR_Y - 4, width: 204, height: 8, fill: "#ffffff", opacity: 0.6 }));

  for (const z of ZONES) {
    const isHi = z.id === highlightZoneId;
    svg.appendChild(svgEl("rect", {
      x: z.x, y: z.y, width: z.w, height: z.h,
      rx: 3, ry: 3,
      fill: isHi ? "#2c7a4b" : "white",
      stroke: isHi ? "#1f5634" : "#d1d5db",
      "stroke-width": isHi ? 2 : 1,
    }));

    if (z.kind === "aisle") {
      const cx = z.x + z.w / 2, cy = z.y + z.h / 2;
      const t = svgEl("text", {
        x: cx, y: cy, "text-anchor": "middle",
        "font-size": 9, "font-weight": 600,
        fill: isHi ? "white" : "#374151",
        transform: `rotate(-90 ${cx} ${cy})`,
      });
      t.textContent = z.name === "Produce" ? "Produce" : z.name.replace("Aisle ", "A");
      svg.appendChild(t);
    } else {
      const t = svgEl("text", {
        x: z.x + z.w / 2, y: z.y + z.h / 2 + 3,
        "text-anchor": "middle", "font-size": 9, "font-weight": 600,
        fill: isHi ? "white" : "#374151",
      });
      t.textContent = z.name;
      svg.appendChild(t);
    }
  }

  // Entrance
  svg.appendChild(svgEl("rect", {
    x: ENTRANCE.x, y: ENTRANCE.y, width: ENTRANCE.w, height: ENTRANCE.h,
    rx: 3, ry: 3, fill: "#fef3c7", stroke: "#92400e", "stroke-width": 1,
  }));
  const entText = svgEl("text", {
    x: ENTRANCE.x + ENTRANCE.w / 2, y: ENTRANCE.y + 13,
    "text-anchor": "middle", "font-size": 9, "font-weight": 700, fill: "#92400e",
  });
  entText.textContent = "🚪 Entrance";
  svg.appendChild(entText);
}

function drawRouteAndPin(pin, route) {
  const svg = $("finderMap");
  const pts = route.map(p => `${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(" ");
  svg.appendChild(svgEl("polyline", {
    points: pts,
    fill: "none", stroke: "#f59e0b",
    "stroke-width": 2.5, "stroke-linecap": "round", "stroke-linejoin": "round",
    "stroke-dasharray": "4 3",
  }));
  const dest = route[route.length - 1];
  svg.appendChild(svgEl("circle", {
    cx: dest.x, cy: dest.y, r: 4,
    fill: "#2c7a4b", stroke: "white", "stroke-width": 1.5,
  }));
  svg.appendChild(svgEl("circle", {
    cx: pin.x, cy: pin.y, r: 6,
    fill: "#2563eb", stroke: "white", "stroke-width": 2,
  }));
  const pinLabel = svgEl("text", {
    x: pin.x, y: pin.y - 9,
    "text-anchor": "middle", "font-size": 8, "font-weight": 700, fill: "#1e40af",
  });
  pinLabel.textContent = "You";
  svg.appendChild(pinLabel);
}

function openFinder(itemId) {
  const it = state.items.find(i => i.id === itemId);
  if (!it) return;
  const zone = zoneById(it.aisle);
  $("finderTitle").textContent = `Finding: ${it.name}`;
  const subText = zone.sub ? ` — ${zone.sub}` : "";
  $("finderLoc").textContent = `📍 ${zone.name}${subText}`;

  drawMap(zone.id);
  const target = zoneCenter(zone);
  const pin = pickRandomPin();
  const route = buildRoute(pin, target, zone);
  drawRouteAndPin(pin, route);

  $("finderModal").classList.add("open");
}
function closeFinder() { $("finderModal").classList.remove("open"); }

/* ============ Wire up ============ */
$("addBtn").addEventListener("click", () => {
  if (addItem(inputEl.value)) { inputEl.value = ""; lastTyped = ""; inputEl.focus(); }
});
$("shopBtn").addEventListener("click", toggleShopping);
$("clearBtn").addEventListener("click", clearList);
$("undoBtn").addEventListener("click", undo);
$("removeTickedBtn").addEventListener("click", removeTicked);
$("themeToggle").addEventListener("click", toggleTheme);
$("modePill").addEventListener("click", toggleShopping);
$("shoppingBanner").addEventListener("click", toggleShopping);
$("shareBtn").addEventListener("click", shareList);
$("printBtn").addEventListener("click", printList);

/* Chevron toggle: open suggestions with full catalog when input is empty */
$("chevronBtn").addEventListener("mousedown", (e) => {
  e.preventDefault();
  if (suggBox.classList.contains("open")) {
    suggBox.classList.remove("open");
    return;
  }
  const q = inputEl.value.trim();
  const matches = q ? rankMatches(q) : [...CATALOG].sort((a, b) => a.name.localeCompare(b.name));
  activeSugg = 0;
  renderSuggestions(matches, q);
  inputEl.focus();
});
$("finderClose").addEventListener("click", closeFinder);
$("finderModal").addEventListener("click", (e) => {
  if (e.target.id === "finderModal") closeFinder();
});

$("list").addEventListener("click", (e) => {
  const c = e.target.closest("[data-id]");
  const f = e.target.closest("[data-find]");
  const d = e.target.closest("[data-del]");
  if (c) toggleItem(c.dataset.id);
  else if (f) openFinder(f.dataset.find);
  else if (d) deleteItem(d.dataset.del);
});

render();

/* ============ PWA ============ */
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("sw.js").catch(() => {});
  });
}
</script>
